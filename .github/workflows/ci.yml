name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install -e ".[dev]"
      - run: npm ci
      - run: python -m sieve --help
      - run: python -m sieve run --task SIEVE-T1 --runs-dir bootstrap-runs
      - run: npm run test:web
      - run: npm run demo:verify
      - run: pytest -v
      - run: ruff check .
      - run: black --check .
      - run: mypy --strict .
